<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linkzor Tecnologia - Sistema Completo</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0;padding:20px}
h1{text-align:center}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{background:#2563eb;color:#fff;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
img{max-width:100px;margin:auto;display:block}
.whats{background:#22c55e}
#painel{display:none}
</style>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>

<h1>Linkzor Tecnologia 🚀</h1>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:auto">
<h3>Login</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel">

<div class="card">
<h3>Cadastrar Parceiro</h3>
<input type="text" id="nome" placeholder="Nome da empresa">
<input type="text" id="whatsapp" placeholder="WhatsApp (75999999999)">
<input type="file" id="logo">
<button onclick="cadastrar()">Salvar</button>
</div>

<h3>Parceiros</h3>
<div id="lista" class="grid"></div>

</div>

<script>

// 🔥 SUA CONFIG (já aplicada)
const firebaseConfig = {
  apiKey: "AIzaSyAbF9bnWffVLmjYt1a1HDoht-AkCi6mv9s",
  authDomain: "painel-linkzor-tecnologia.firebaseapp.com",
  projectId: "painel-linkzor-tecnologia",
  storageBucket: "painel-linkzor-tecnologia.firebasestorage.app",
  messagingSenderId: "1093989364541",
  appId: "1:1093989364541:web:57686d1861ada1189dcb54"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// 🔐 LOGIN
function login(){
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  auth.signInWithEmailAndPassword(email, senha)
  .catch(e => alert(e.message));
}

// 🔄 SESSÃO
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('painel').style.display='block';
    listar();
  }
});

// ➕ CADASTRAR
async function cadastrar(){
  const nome = document.getElementById('nome').value;
  const whatsapp = document.getElementById('whatsapp').value;
  const file = document.getElementById('logo').files[0];

  if(!nome || !whatsapp || !file) return alert('Preencha tudo');

  const ref = storage.ref('logos/' + Date.now());
  await ref.put(file);
  const logo = await ref.getDownloadURL();

  await db.collection('parceiros').add({nome, whatsapp, logo});

  alert('Salvo!');
  listar();
}

// 📋 LISTAR
async function listar(){
  const lista = document.getElementById('lista');
  lista.innerHTML='';

  const snap = await db.collection('parceiros').get();

  snap.forEach(doc=>{
    const p = doc.data();

    lista.innerHTML += `
    <div class="card" style="text-align:center">
      <img src="${p.logo}">
      <h3>${p.nome}</h3>

      <a href="https://wa.me/55${p.whatsapp}" target="_blank">
        <button class="whats">WhatsApp</button>
      </a>

      <button onclick="excluir('${doc.id}')">Excluir</button>
    </div>`;
  });
}

// ❌ EXCLUIR
async function excluir(id){
  if(confirm('Excluir?')){
    await db.collection('parceiros').doc(id).delete();
    listar();
  }
}

</script>

</body>
</html>
