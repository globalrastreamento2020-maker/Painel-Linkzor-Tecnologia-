<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linkzor Tecnologia - Painel PRO</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0;padding:20px}
h1{margin-bottom:10px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{background:#2563eb;color:#fff;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
img{max-width:100px}
a{color:#38bdf8}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>

<h1>Painel Linkzor Tecnologia 🚀</h1>

<div class="card">
<h3>Cadastrar Parceiro</h3>
<input type="text" id="nome" placeholder="Nome da empresa">
<input type="text" id="whatsapp" placeholder="WhatsApp (75999999999)">
<input type="file" id="logo">
<button onclick="cadastrar()">Salvar Parceiro</button>
</div>

<h3>Parceiros cadastrados</h3>
<div id="lista" class="grid"></div>

<script>
// 🔥 COLE SUA CONFIG AQUI
const firebaseConfig = {
  apiKey: "AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
  authDomain: "global-tecnologia-kanban.firebaseapp.com",
  projectId: "global-tecnologia-kanban",
  storageBucket: "global-tecnologia-kanban.firebasestorage.app",
  messagingSenderId: "526527534352",
  appId: "1:526527534352:web:22b874f8029b3cd4c48195",
  measurementId: "G-MX3QFXSL04"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// 🚀 CADASTRAR
async function cadastrar(){
  const nome = document.getElementById('nome').value;
  const whatsapp = document.getElementById('whatsapp').value;
  const file = document.getElementById('logo').files[0];

  if(!nome || !whatsapp || !file){
    alert('Preencha todos os campos');
    return;
  }

  const ref = storage.ref('logos/' + Date.now());
  await ref.put(file);
  const logoURL = await ref.getDownloadURL();

  await db.collection('parceiros').add({
    nome,
    whatsapp,
    logo: logoURL
  });

  alert('Parceiro cadastrado!');
  listar();
}

// 📋 LISTAR
async function listar(){
  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  const snapshot = await db.collection('parceiros').get();

  snapshot.forEach(doc => {
    const p = doc.data();
    const id = doc.id;

    lista.innerHTML += `
    <div class="card">
      <img src="${p.logo}">
      <h4>${p.nome}</h4>
      <p>${p.whatsapp}</p>
      <a href="suporte.html?id=${id}" target="_blank">Abrir Página</a>
      <button onclick="excluir('${id}')">Excluir</button>
    </div>`;
  });
}

// ❌ EXCLUIR
async function excluir(id){
  if(confirm('Excluir parceiro?')){
    await db.collection('parceiros').doc(id).delete();
    listar();
  }
}

listar();
</script>



<!-- 🔐 LOGIN SIMPLES COM FIREBASE AUTH -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<div id="loginBox" class="card" style="max-width:400px;margin:auto">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<script>
const auth = firebase.auth();

function login(){
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  auth.signInWithEmailAndPassword(email, senha)
    .then(() => {
      document.getElementById('loginBox').style.display = 'none';
      document.querySelectorAll('.card, h3, #lista').forEach(el=>el.style.display='block');
    })
    .catch(() => alert('Login inválido'));
}

// 🔒 BLOQUEAR ACESSO
function bloquearSistema(){
  document.querySelectorAll('.card, h3, #lista').forEach(el=>el.style.display='none');
}

bloquearSistema();

// 🔄 VERIFICAR SESSÃO
firebase.auth().onAuthStateChanged(user => {
  if(user){
    document.getElementById('loginBox').style.display = 'none';
    document.querySelectorAll('.card, h3, #lista').forEach(el=>el.style.display='block');
  } else {
    bloquearSistema();
  }
});
</script>

</body>
</html>
